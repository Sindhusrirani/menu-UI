<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radial Menu UI</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#020617;
        overflow:hidden;
    }

    .menu{
        position:relative;
        width:300px;
        height:300px;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    #toggle{
        display:none;
    }

    /* Center Button */

    .center-btn{
        width:75px;
        height:75px;
        border-radius:50%;
        background:linear-gradient(135deg,#6366f1,#a855f7);
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
        font-size:40px;
        cursor:pointer;
        z-index:100;
        transition:0.4s;
        box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }

    #toggle:checked + .center-btn{
        transform:rotate(135deg);
    }

    /* Menu Items */

    .item{
        position:absolute;
        width:60px;
        height:60px;
        border-radius:50%;
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(10px);
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:24px;
        cursor:pointer;
        transition:0.4s ease;
        opacity:0;
        transform:scale(0);
        box-shadow:0 5px 20px rgba(0,0,0,0.3);
    }

    .item:hover{
        background:rgba(255,255,255,0.2);
        transform:scale(1.15);
    }

    /* Tooltip */

    .item::after{
        content:attr(data-label);
        position:absolute;
        top:-35px;
        background:rgba(0,0,0,0.8);
        color:white;
        padding:6px 10px;
        border-radius:6px;
        font-size:12px;
        white-space:nowrap;
        opacity:0;
        transition:0.3s;
        pointer-events:none;
    }

    .item:hover::after{
        opacity:1;
    }

    /* Open Positions */

    #toggle:checked ~ .item1{
        transform:translate(-110px,-110px) scale(1);
        opacity:1;
    }

    #toggle:checked ~ .item2{
        transform:translate(0,-150px) scale(1);
        opacity:1;
    }

    #toggle:checked ~ .item3{
        transform:translate(110px,-110px) scale(1);
        opacity:1;
    }

    #toggle:checked ~ .item4{
        transform:translate(150px,0) scale(1);
        opacity:1;
    }

    #toggle:checked ~ .item5{
        transform:translate(110px,110px) scale(1);
        opacity:1;
    }

    #toggle:checked ~ .item6{
        transform:translate(-110px,110px) scale(1);
        opacity:1;
    }

    /* Output Box */

    #output{
        position:absolute;
        bottom:60px;
        color:white;
        font-size:24px;
        text-align:center;
        width:100%;
        transition:0.3s;
    }

</style>

</head>

<body>

<div id="output">Click a menu item</div>

<div class="menu">

    <input type="checkbox" id="toggle">

    <label for="toggle" class="center-btn">+</label>

    <div class="item item1"
         data-label="Home"
         onclick="showMessage('Home Section Opened')">
         🏠
    </div>

    <div class="item item2"
         data-label="Profile"
         onclick="showMessage('Profile Loaded')">
         👤
    </div>

    <div class="item item3"
         data-label="Analytics"
         onclick="showMessage('Analytics Dashboard Opened')">
         📊
    </div>

    <div class="item item4"
         data-label="Messages"
         onclick="showMessage('Messages Opened')">
         ✉️
    </div>

    <div class="item item5"
         data-label="Alerts"
         onclick="showMessage('Notifications Opened')">
         🔔
    </div>

    <div class="item item6"
         data-label="Settings"
         onclick="showMessage('Settings Panel Opened')">
         ⚙️
    </div>

</div>

<script>

    function showMessage(message){
        document.getElementById("output").innerText = message;
    }

</script>

</body>
</html>
