<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Radial Menu UI</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #020617;
        font-family: Arial, sans-serif;
    }

    .menu {
        position: relative;
        width: 200px;
        height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #toggle {
        display: none;
    }

    .center-btn {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 28px;
        cursor: pointer;
        z-index: 10;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        transition: transform 0.3s;
    }

    #toggle:checked + .center-btn {
        transform: rotate(135deg);
    }

    .item {
        position: absolute;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        cursor: pointer;
        opacity: 0;
        transform: scale(0);
        transition: 0.4s ease;
        position: absolute;
    }

    /* Tooltip */
    .item::after {
        content: attr(data-label);
        position: absolute;
        background: rgba(0,0,0,0.8);
        color: #fff;
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 6px;
        white-space: nowrap;
        top: -28px;
        opacity: 0;
        transform: translateY(5px);
        transition: 0.2s ease;
        pointer-events: none;
    }

    .item:hover::after {
        opacity: 1;
        transform: translateY(0);
    }

    .item:hover {
        background: rgba(255,255,255,0.2);
        transform: scale(1.2);
    }

    #toggle:checked ~ .item1 {
        transform: translate(-100px, -100px) scale(1);
        opacity: 1;
    }

    #toggle:checked ~ .item2 {
        transform: translate(0, -140px) scale(1);
        opacity: 1;
    }

    #toggle:checked ~ .item3 {
        transform: translate(100px, -100px) scale(1);
        opacity: 1;
    }

    #toggle:checked ~ .item4 {
        transform: translate(140px, 0) scale(1);
        opacity: 1;
    }

    #toggle:checked ~ .item5 {
        transform: translate(100px, 100px) scale(1);
        opacity: 1;
    }

    #toggle:checked ~ .item6 {
        transform: translate(-100px, 100px) scale(1);
        opacity: 1;
    }
</style>
</head>
<body>

<div class="menu">
    <input type="checkbox" id="toggle" />
    <label for="toggle" class="center-btn">+</label>

    <div class="item item1" data-label="Home">🏠</div>
    <div class="item item2" data-label="Profile">👤</div>
    <div class="item item3" data-label="Analytics">📊</div>
    <div class="item item4" data-label="Messages">✉️</div>
    <div class="item item5" data-label="Alerts">🔔</div>
    <div class="item item6" data-label="Settings">⚙️</div>
</div>

</body>
</html>
